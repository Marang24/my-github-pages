        <main>
            <p> If you you'd like to get in touch with us, feel free to email us at <a href="giftwrapped@gmail.com">giftwrapped@gmail.com</a><br>please add your information and message us what you want and how it can be delivered.</p>
            <div class="contact-form">
                <form id="contact-form">
            <form action="giftwrapped@gmail.com" method="post" enctype="text/plain">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <button type="submit">Send Message</button>
                </form>
                <div id="response-message"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const form = document.querySelector(".contact-form form");
    const response = document.getElementById("response-message");

    form.addEventListener("submit", function(event) {
        event.preventDefault();
        response.textContent = "✅ Thank you! Your message has been received.";
        response.style.color = "green";
    });
});
</script>
